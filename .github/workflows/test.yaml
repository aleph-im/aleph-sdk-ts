name: Test suite

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      heph:
        image: ghcr.io/aleph-im/heph:0.2.0
        ports:
          - 4024:4024

    env:
      ALEPH_API_SERVER: http://localhost:4024
      ALEPH_API_WS_SERVER: ws://localhost:4024

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Wait for heph
        run: ./scripts/wait-for-heph.sh "$ALEPH_API_SERVER"

      - name: Run tests
        run: npm run test -- --runInBand
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
