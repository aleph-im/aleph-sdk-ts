name: Publish Packages (NPM & Github)
on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC
  packages: write
  contents: read
  
jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup node"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: "Install deps"
        run: npm ci

      - name: "Build"
        run: npm run build

      - name: "Publish package"
        run: npm run release:publish
        env:
          NPM_CONFIG_PROVENANCE: true

  publish-github:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup node"
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aleph-sdk'

      - name: "Prepare npmrc"
        run: envsubst  < .npmrc_ci > .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN}}

      - name: "Install deps"
        run: npm ci

      - name: "Build"
        run: npm run build

      - name: "Publish package"
        run: npm run release:publish
